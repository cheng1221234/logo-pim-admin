# LOGOPIM 后台管理系统 - Nginx 配置
# 使用方式：
# 1. 修改 SERVER_DOMAIN 为你的域名（或保留 localhost）
# 2. 复制到 /etc/nginx/sites-available/logo-pim-admin
# 3. ln -s /etc/nginx/sites-available/logo-pim-admin /etc/nginx/sites-enabled/
# 4. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name localhost;  # 改为你的域名，例如 logo.example.com

    # 客户端上传大小限制（压缩包最大 200MB + 余量）
    client_max_body_size 210M;

    # 后台管理系统
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如有需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置（大文件上传）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

